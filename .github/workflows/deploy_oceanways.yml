name: Deploy · Ocean Ways

# CI/CD para o app Ocean Ways (monorepo em apps/oceanways/)
# Gatilhos: push em main ou feat/oceanways-* tocando apps/oceanways/
# Consistente com deploy_hosting.yml do TransparênciaBR

on:
  push:
    branches:
      - main
      - feat/oceanways-mvp
    paths:
      - "apps/oceanways/**"
      - ".github/workflows/deploy_oceanways.yml"
  workflow_dispatch: {}

concurrency:
  group: oceanways-${{ github.ref }}
  cancel-in-progress: false

# TODO (Maestro): adicionar jobs de deploy ao habilitar CI real

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Testes do backend
  # ---------------------------------------------------------------------------
  test-backend:
    name: Test · Backend (FastAPI)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/oceanways/backend/requirements.txt

      - name: Install deps
        working-directory: apps/oceanways/backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: apps/oceanways/backend
        run: |
          # TODO (Maestro): desabilitar skip quando testes forem implementados
          echo "TODO: pytest apps/oceanways/backend/tests/"
          echo "Skipping (scaffold — sem testes implementados)"

  # ---------------------------------------------------------------------------
  # Job 2: Build frontend
  # ---------------------------------------------------------------------------
  build-frontend:
    name: Build · Frontend (Vite)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # cache desativado até que package-lock.json seja gerado (scaffold)

      - name: Install deps
        working-directory: apps/oceanways/frontend
        run: |
          # TODO (Maestro): gerar package-lock.json antes de habilitar CI
          echo "TODO: npm ci"
          echo "Skipping (package-lock.json não gerado ainda — scaffold)"

      - name: Build
        working-directory: apps/oceanways/frontend
        run: |
          echo "TODO: npm run build"
          echo "Skipping (scaffold)"
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_OCEANWAYS_API_URL: ${{ secrets.VITE_OCEANWAYS_API_URL }}

