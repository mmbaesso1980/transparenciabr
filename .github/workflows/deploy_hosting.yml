name: Deploy · Firebase Hosting

# Build estático do frontend + deploy automático no transparenciabr.web.app
# Gatilho: push em main que toque frontend/, firebase.json, firestore.rules,
# ou alteração no próprio workflow / DEPLOY_TRIGGER.md.

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "firebase.json"
      - "firestore.rules"
      - ".github/workflows/deploy_hosting.yml"
      - ".github/DEPLOY_TRIGGER.md"
  workflow_dispatch: {} # botão manual no Actions

concurrency:
  group: hosting-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy hosting
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend (Vite + secrets)
        working-directory: frontend
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_MEASUREMENT_ID: ${{ secrets.VITE_MEASUREMENT_ID }}
          VITE_RADAR_ADMIN_UID: ${{ secrets.VITE_RADAR_ADMIN_UID }}
          VITE_BR_PM_TILES_URL: ${{ secrets.VITE_BR_PM_TILES_URL }}
          VITE_PM_TILES_SOURCE_LAYER: municipios
          VITE_INITIAL_USER_CREDITS: "300"
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_STRIPE_PRICE_ID: ${{ secrets.VITE_STRIPE_PRICE_ID }}
        run: npm run build

      - name: Anti-bundle-vazio (sanity check)
        working-directory: frontend
        run: |
          # Critério único: a config Firebase real (objeto literal Vite injeta) DEVE
          # conter apiKey:`AIza...`. Se aparecer, login funciona. Não tentamos
          # detectar empty-strings porque o Firebase SDK tem uma constante interna
          # Object.freeze({apiKey:``...}) que sempre aparece e gera falso positivo.
          if grep -qE 'apiKey:`AIza[A-Za-z0-9_-]{20,}`' dist/assets/*.js 2>/dev/null; then
            echo "✅ Bundle injetou apiKey real (formato AIza... detectado)"
          else
            echo "::error::Bundle não contém apiKey válida (formato AIza...) — verifique secrets VITE_FIREBASE_* no GitHub Settings → Secrets and variables → Actions"
            grep -oE '.{8}apiKey:[^,]{0,40}' dist/assets/*.js | head -5
            exit 1
          fi

      - name: Auth GCP (Service Account)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Deploy Hosting
        run: firebase deploy --only hosting --project transparenciabr --non-interactive

      - name: Summary
        if: always()
        run: |
          echo "## Deploy Hosting" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- URL: https://transparenciabr.web.app" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
