# Ingestão incremental canônica.
#
# O Master Pipeline (`transparencia_br_master.yml`) é a fonte da verdade para a
# orquestração completa. Este workflow diário/manual roda somente a fase de
# ingestão e sincronização incremental com engines que existem no repositório.

name: 🔄 Ingest Incremental

on:
  workflow_dispatch:
    inputs:
      emendas_start_year:
        description: "Ano inicial para retomar Engine 02 (opcional)"
        required: false
        type: string
      emendas_start_page:
        description: "Página inicial para o ano inicial da Engine 02 (opcional)"
        required: false
        type: string
  schedule:
    - cron: "0 9 * * *"

jobs:
  ingest:
    name: Ingest incremental canônico
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      CGU_API_TOKEN: ${{ secrets.CGU_API_TOKEN }}
      EMENDAS_START_YEAR: ${{ inputs.emendas_start_year }}
      EMENDAS_START_PAGE: ${{ inputs.emendas_start_page }}
      RADAR_OWNER_UID: ${{ secrets.RADAR_OWNER_UID }}
      PYTHONPATH: ${{ github.workspace }}/engines
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engines/requirements.txt

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r engines/requirements.txt

      - name: Validar referências de engines nos workflows
        run: python scripts/validate_workflow_engines.py

      - name: 🔑 Preparar credenciais GCP
        run: |
          SA_FILE=$(mktemp /tmp/gcp_sa_XXXXXX.json)
          printf '%s' "$GOOGLE_CREDENTIALS_JSON" > "$SA_FILE"

          if python3 -c "import json; json.load(open('$SA_FILE'))" 2>/dev/null; then
            echo "[creds] JSON válido."
          else
            echo "[creds] Não é JSON puro, tentando decode base64..."
            printf '%s' "$GOOGLE_CREDENTIALS_JSON" | base64 -d > "$SA_FILE" 2>/dev/null || true
            if python3 -c "import json; json.load(open('$SA_FILE'))" 2>/dev/null; then
              echo "[creds] JSON válido após base64 decode."
            else
              echo "[creds] ERRO: secret GCP_SERVICE_ACCOUNT_JSON não é JSON válido nem base64 válido."
              exit 1
            fi
          fi

          chmod 600 "$SA_FILE"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$SA_FILE" >> "$GITHUB_ENV"
          echo "_SA_FILE=$SA_FILE" >> "$GITHUB_ENV"

      # ── INGEST BASE ────────────────────────────────────────────────────────
      - name: "[01] Políticos (Câmara + Senado)"
        run: python engines/01_ingest_politicos.py

      - name: "[02] Emendas (CGU API)"
        run: python engines/02_ingest_emendas.py

      - name: "[06] Contexto socioeconômico"
        run: python engines/06_sync_context_socio.py
        continue-on-error: true

      - name: "[07] TCU CADIRREG"
        run: python engines/07_ingest_tcu_cadirreg.py --allow-empty
        continue-on-error: true

      - name: "[15] PNCP Licitações"
        run: python engines/15_ingest_pncp.py
        continue-on-error: true

      - name: "[17] SIOP Orçamento"
        run: python engines/17_ingest_siop_budget.py
        continue-on-error: true

      - name: "[18] PNCP PCA"
        run: python engines/18_ingest_pncp_pca.py
        continue-on-error: true

      # ── ANÁLISE & SCORES ──────────────────────────────────────────────────
      - name: "[10] Universal Crawler (batch)"
        run: python engines/10_universal_crawler.py --batch
        continue-on-error: true

      - name: "[11] Ghost Hunter"
        run: python engines/11_ghost_hunter.py
        continue-on-error: true

      - name: "[12] Family Ties"
        run: python engines/12_family_ties.py
        continue-on-error: true

      - name: "[22] LGPD shield"
        run: python engines/22_lgpd_shield.py
        continue-on-error: true

      - name: "[23] Neutrality Check"
        run: python engines/23_neutrality_check.py
        continue-on-error: true

      - name: "[24] Spectrum analyzer"
        run: python engines/24_spectrum_analyzer.py
        continue-on-error: true

      - name: "[25] Alliance Scanner"
        run: python engines/25_alliance_scanner.py
        continue-on-error: true

      - name: "[05] Sync bodes"
        run: python engines/05_sync_bodes.py

      - name: 🧹 Remover credencial
        if: always()
        run: rm -f "$_SA_FILE"
