# Orquestração A.S.M.O.D.E.U.S. — ingestão TCU (EL) antes do pipeline SQL no BigQuery.
# Contexto socioeconómico permanece em `asmodeus_context_socio.yml`. Este cron foca motor preditivo.
#
# Cadência sugerida: mensal (dia 2, 06:15 UTC). Ajuste conforme custo de API TCU.

name: A.S.M.O.D.E.U.S. cron — TCU + SQL

on:
  schedule:
    - cron: "15 6 2 * *"
  workflow_dispatch:

jobs:
  tcu-then-sql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r engines/requirements.txt

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

      # TCU CADIRREG: endpoint público costuma ser por CPF ou mudar — usar --from-ndjson no runner
      # ou espelhar lista quando disponível. --allow-empty mantém o pipeline SQL mensal mesmo sem linhas TCU.
      - name: Ingest TCU CADIRREG → BigQuery
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: python engines/07_ingest_tcu_cadirreg.py --allow-empty

      - name: Pipeline SQL BigQuery (run_sql)
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: python engines/run_sql.py

      # Motores Firestore — best-effort após dados BQ/SQL (não bloqueiam TCU).
      - name: ENGINE 23 — Neutralidade (alertas × partido)
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: python engines/23_neutrality_check.py --days 90
        continue-on-error: true

      - name: ENGINE 24 — Espectro (mock; substituir por API quando estável)
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: python engines/24_spectrum_analyzer.py --mock --max-deps 80 --max-votos 25
        continue-on-error: true

      - name: ENGINE 25 — Alliance Scanner (clusters)
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: python engines/25_alliance_scanner.py
        continue-on-error: true
