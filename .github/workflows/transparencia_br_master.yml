name: Transparência BR · Master Pipeline

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: master-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    continue-on-error: true
    env:
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      CGU_API_TOKEN: ${{ secrets.CGU_API_TOKEN }}
      RADAR_OWNER_UID: ${{ secrets.RADAR_OWNER_UID }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engines/requirements.txt

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install \
            google-cloud-bigquery==3.41.0 \
            firebase-admin==7.4.0 \
            requests==2.31.0 \
            pandas==2.2.2 \
            google-genai==0.5.0 \
            google-generativeai==0.8.6 \
            pydantic==2.9.2 \
            lxml==5.3.0

      - name: Preparar credenciais GCP
        run: |
          SA_FILE=$(mktemp)
          trap 'rm -f "$SA_FILE"' EXIT
          printf '%s' "$GOOGLE_CREDENTIALS_JSON" > "$SA_FILE"
          chmod 600 "$SA_FILE"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$SA_FILE" >> $GITHUB_ENV

      - name: "Engine 01 — Ingest Políticos (Câmara)"
        continue-on-error: true
        run: python engines/01_ingest_politicos.py

      - name: "Engine 14 — Ingest Senadores"
        continue-on-error: true
        run: python engines/14_ingest_senadores.py

      - name: "Engine 02 — Ingest Emendas"
        continue-on-error: true
        run: python engines/02_ingest_emendas.py

      - name: "Engine 07 — Ingest TCU CADIRREG"
        continue-on-error: true
        run: python engines/07_ingest_tcu_cadirreg.py

      - name: "Engine 15 — Ingest PNCP Licitações"
        continue-on-error: true
        run: python engines/15_ingest_pncp.py

      - name: "Engine 17 — Ingest SIOP Orçamento"
        continue-on-error: true
        run: python engines/17_ingest_siop_budget.py

      - name: "Engine 18 — Ingest PNCP PCA"
        continue-on-error: true
        run: python engines/18_ingest_pncp_pca.py

      - name: "Engine 05 — Sync Bodes (Alertas)"
        continue-on-error: true
        run: python engines/05_sync_bodes.py

      - name: "Engine 06 — Sync Contexto Socioeconômico"
        continue-on-error: true
        run: python engines/06_sync_context_socio.py

      - name: "Engine 10 — Universal Crawler"
        continue-on-error: true
        run: python engines/10_universal_crawler.py

      - name: "Engine 11 — Ghost Hunter"
        continue-on-error: true
        run: python engines/11_ghost_hunter.py

      - name: "Engine 12 — Family Ties"
        continue-on-error: true
        run: python engines/12_family_ties.py

      - name: "Engine 16 — OSS Mapper"
        continue-on-error: true
        run: python engines/16_oss_mapper.py

      - name: "Engine 18 — OSS Scanner"
        continue-on-error: true
        run: python engines/18_oss_scanner.py

      - name: "Engine 17 — Commercial Radar"
        continue-on-error: true
        run: python engines/17_commercial_radar.py

      - name: "Engine 23 — Neutrality Check"
        continue-on-error: true
        run: python engines/23_neutrality_check.py

      - name: "Engine 24 — Spectrum Analyzer"
        continue-on-error: true
        run: python engines/24_spectrum_analyzer.py

      - name: "Engine 25 — Alliance Scanner"
        continue-on-error: true
        run: python engines/25_alliance_scanner.py

      - name: "Engine 07 — Gemini Translator"
        continue-on-error: true
        run: python engines/07_gemini_translator.py

      - name: "Engine 08 — Web Call"
        continue-on-error: true
        run: python engines/08_web_call.py

      - name: "Engine 09/22 — LGPD Shield"
        continue-on-error: true
        run: python engines/22_lgpd_shield.py

      - name: Verify no credentials left behind
        if: always()
        run: |
          if find /tmp -name 'tmp.*' -newer /tmp 2>/dev/null | xargs grep -l 'private_key' 2>/dev/null | grep -q .; then
            echo "❌ Possível credencial detectada em /tmp!"
            exit 1
          fi
          echo "✅ Nenhuma credencial residual detectada."

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ingest-logs
          path: logs/
