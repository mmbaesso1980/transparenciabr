name: Transparência BR · Master Pipeline

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      emendas_start_year:
        description: "Ano inicial da Engine 02 (ex.: 2019 para retomar)"
        required: false
        type: string
      emendas_start_page:
        description: "Página inicial no ano inicial da Engine 02 (ex.: 410 para retomar)"
        required: false
        type: string

concurrency:
  group: master-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: engines
    env:
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      CGU_API_TOKEN: ${{ secrets.CGU_API_TOKEN }}
      RADAR_OWNER_UID: ${{ secrets.RADAR_OWNER_UID }}
      EMENDAS_START_YEAR: ${{ github.event.inputs.emendas_start_year || '' }}
      EMENDAS_START_PAGE: ${{ github.event.inputs.emendas_start_page || '' }}
      PYTHONPATH: ${{ github.workspace }}/engines
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engines/requirements.txt

      - name: Instalar Dependências
        working-directory: ${{ github.workspace }}
        run: |
          python -m pip install --upgrade pip
          pip install \
            google-cloud-bigquery==3.41.0 \
            firebase-admin==7.4.0 \
            requests==2.31.0 \
            pandas==2.2.2 \
            google-genai==0.5.0 \
            google-generativeai==0.8.6 \
            pydantic==2.9.2 \
            lxml==5.3.0

      - name: Validar referências de engines nos workflows
        working-directory: ${{ github.workspace }}
        run: python scripts/validate_workflow_engines.py

      - name: Preparar credenciais GCP
        working-directory: ${{ github.workspace }}
        run: |
          SA_FILE=$(mktemp /tmp/gcp_sa_XXXXXX.json)

          printf '%s' "$GOOGLE_CREDENTIALS_JSON" > "$SA_FILE"

          if python3 -c "import json,sys; json.load(open('$SA_FILE'))" 2>/dev/null; then
            echo "[creds] JSON válido."
          else
            echo "[creds] Não é JSON puro, tentando decode base64..."
            printf '%s' "$GOOGLE_CREDENTIALS_JSON" | base64 -d > "$SA_FILE" 2>/dev/null || true
            if python3 -c "import json,sys; json.load(open('$SA_FILE'))" 2>/dev/null; then
              echo "[creds] JSON válido após base64 decode."
            else
              echo "[creds] ERRO: secret GCP_SERVICE_ACCOUNT_JSON não é JSON válido nem base64 válido."
              printf '%s' "$GOOGLE_CREDENTIALS_JSON" | head -c 80
              echo ""
              exit 1
            fi
          fi

          chmod 600 "$SA_FILE"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$SA_FILE" >> $GITHUB_ENV
          echo "_SA_FILE=$SA_FILE" >> $GITHUB_ENV

      # ── Fase 1: Ingestão base ──────────────────────────────────────────────
      - name: "Engine 01 — Ingest Políticos (Câmara + Senado)"
        run: python 01_ingest_politicos.py

      - name: "Engine 02 — Ingest Emendas (CGU API)"
        run: python 02_ingest_emendas.py

      - name: "Engine 07 — Ingest TCU CADIRREG"
        continue-on-error: true
        run: python 07_ingest_tcu_cadirreg.py

      - name: "Engine 15 — Ingest PNCP Licitações"
        continue-on-error: true
        run: python 15_ingest_pncp.py

      - name: "Engine 17 — Ingest SIOP Orçamento"
        continue-on-error: true
        run: python 17_ingest_siop_budget.py

      - name: "Engine 18 — Ingest PNCP PCA"
        continue-on-error: true
        run: python 18_ingest_pncp_pca.py

      # ── Bootstrap: criar views BigQuery (após ingestão base) ──────────────
      - name: "Bootstrap — Criar/Atualizar Views BigQuery"
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: |
          python3 - <<'EOF'
          from google.cloud import bigquery
          import os, pathlib, sys

          project = os.environ.get("GCP_PROJECT_ID", "transparenciabr")
          client = bigquery.Client(project=project)

          sql_path = pathlib.Path("sql/create_views.sql")
          if not sql_path.exists():
              print("[views] sql/create_views.sql nao encontrado - skip")
              sys.exit(0)

          sql = sql_path.read_text(encoding="utf-8")
          stmts = [s.strip() for s in sql.split(";") if s.strip()]
          errors = 0
          for stmt in stmts:
              try:
                  client.query(stmt).result()
                  print(f"[views] OK: {stmt[:80]}...")
              except Exception as e:
                  print(f"[views] WARN: {e}")
                  errors += 1
          print(f"[views] Concluido: {len(stmts)-errors}/{len(stmts)} statements OK")
          EOF

      # ── Fase 2: Enriquecimento ─────────────────────────────────────────────
      - name: "Engine 06 — Sync Contexto Socioeconômico"
        continue-on-error: true
        run: python 06_sync_context_socio.py

      - name: "Engine 10 — Universal Crawler (batch)"
        continue-on-error: true
        run: python 10_universal_crawler.py --batch --max-politicos 50

      - name: "Engine 11 — Ghost Hunter"
        continue-on-error: true
        run: python 11_ghost_hunter.py --max-politicos 25

      - name: "Engine 12 — Family Ties"
        continue-on-error: true
        run: python 12_family_ties.py

      - name: "Engine 16 — OSS Mapper (batch)"
        continue-on-error: true
        run: python 16_oss_mapper.py --batch

      - name: "Engine 17 — Commercial Radar"
        continue-on-error: true
        run: python 17_commercial_radar.py

      - name: "Engine 18 — OSS Scanner"
        continue-on-error: true
        run: python 18_oss_scanner.py

      # ── Fase 3: Análise / IA ───────────────────────────────────────────────
      - name: "Engine 07 — Gemini Translator"
        continue-on-error: true
        run: python 07_gemini_translator.py

      - name: "Engine 08 — Web Call"
        continue-on-error: true
        run: python 08_web_call.py

      - name: "Engine 22 — LGPD Shield"
        continue-on-error: true
        run: python 22_lgpd_shield.py

      - name: "Engine 23 — Neutrality Check"
        continue-on-error: true
        run: python 23_neutrality_check.py

      - name: "Engine 24 — Spectrum Analyzer"
        continue-on-error: true
        run: python 24_spectrum_analyzer.py

      - name: "Engine 25 — Alliance Scanner"
        continue-on-error: true
        run: python 25_alliance_scanner.py

      # ── Fase 4: Sincronização final ────────────────────────────────────────
      - name: "Engine 05 — Sync Bodes (Alertas)"
        run: python 05_sync_bodes.py

      - name: Remover credenciais do disco
        if: always()
        working-directory: ${{ github.workspace }}
        run: rm -f "$_SA_FILE"
