name: Deploy to Firebase Production

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-production.yml"
      - "firebase.json"
      - ".firebaserc"
      - ".nvmrc"
  workflow_dispatch:

concurrency:
  group: firebase-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy_live:
    name: Build & Deploy to Live Channel
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.VITE_FIREBASE_API_KEY }}" ]; then
            echo "❌ VITE_FIREBASE_API_KEY não configurado"
            exit 1
          fi
          if [ -z "${{ secrets.VITE_FIREBASE_APP_ID }}" ]; then
            echo "❌ VITE_FIREBASE_APP_ID não configurado"
            exit 1
          fi
          echo "✅ Secrets críticos presentes"

      - name: Inject secrets into .env.production
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_MEASUREMENT_ID: ${{ secrets.VITE_MEASUREMENT_ID }}
          VITE_RADAR_ADMIN_UID: ${{ secrets.VITE_RADAR_ADMIN_UID }}
          VITE_BR_PM_TILES_URL: ${{ secrets.VITE_BR_PM_TILES_URL }}
        run: |
          printf 'VITE_FIREBASE_API_KEY=%s\n' "$VITE_FIREBASE_API_KEY" > .env.production
          printf 'VITE_FIREBASE_AUTH_DOMAIN=%s\n' "$VITE_FIREBASE_AUTH_DOMAIN" >> .env.production
          printf 'VITE_FIREBASE_PROJECT_ID=%s\n' "$VITE_FIREBASE_PROJECT_ID" >> .env.production
          printf 'VITE_FIREBASE_STORAGE_BUCKET=%s\n' "$VITE_FIREBASE_STORAGE_BUCKET" >> .env.production
          printf 'VITE_FIREBASE_MESSAGING_SENDER_ID=%s\n' "$VITE_FIREBASE_MESSAGING_SENDER_ID" >> .env.production
          printf 'VITE_FIREBASE_APP_ID=%s\n' "$VITE_FIREBASE_APP_ID" >> .env.production
          printf 'VITE_MEASUREMENT_ID=%s\n' "$VITE_MEASUREMENT_ID" >> .env.production
          printf 'VITE_RADAR_ADMIN_UID=%s\n' "$VITE_RADAR_ADMIN_UID" >> .env.production
          printf 'VITE_BR_PM_TILES_URL=%s\n' "$VITE_BR_PM_TILES_URL" >> .env.production
          printf 'VITE_PM_TILES_SOURCE_LAYER=municipios\n' >> .env.production
          printf 'VITE_INITIAL_USER_CREDITS=320\n' >> .env.production

      - name: Debug .env.production
        run: cat .env.production | sed 's/=.*/=***MASKED***/g'

      - name: Build frontend for production
        run: npm run build -- --mode production

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          projectId: transparenciabr
          channelId: live
