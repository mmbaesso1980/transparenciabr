steps:
  - id: 'build'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/transparenciabr/transparenciabr:$COMMIT_SHA'
      - '-f'
      - 'aurora_v3_maestro/telegram/Dockerfile'
      - '.'

  - id: 'push'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/transparenciabr/transparenciabr:$COMMIT_SHA'

  - id: 'deploy'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'transparenciabr'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/transparenciabr/transparenciabr:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/transparenciabr/transparenciabr:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
