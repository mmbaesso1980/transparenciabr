<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="tb-ring" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#FDE047"/>
      <stop offset="28%" stop-color="#FDBA74"/>
      <stop offset="52%" stop-color="#4ADE80"/>
      <stop offset="78%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#FDE047"/>
    </linearGradient>
    <radialGradient id="tb-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#7DD3FC" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7DD3FC" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g transform="translate(4,4)">
    <!-- Anel principal (mobius solar) -->
    <circle cx="20" cy="20" r="18" stroke="url(#tb-ring)" stroke-width="3.5" fill="none" opacity="0.95"/>
    <!-- Arco off-axis (ó́rbita secundária — sensação de inteligência multi-camada) -->
    <ellipse cx="20" cy="20" rx="18" ry="9" stroke="url(#tb-ring)" stroke-width="2" fill="none" opacity="0.55" transform="rotate(-25 20 20)"/>
    <!-- Anel interno (núcleo OSINT) -->
    <circle cx="20" cy="20" r="8" stroke="url(#tb-ring)" stroke-width="2" fill="none" opacity="0.7"/>
    <!-- Núcleo luminoso (ponto focal — "lente" forense) -->
    <circle cx="20" cy="20" r="3.2" fill="url(#tb-core)"/>
  </g>
  <text x="52" y="32" fill="#E6EDF3" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600" letter-spacing="-0.02em">transparenciabr</text>
</svg>
